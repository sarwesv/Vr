<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quest Mirror</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="ui">
    <h1>Quest Mirror</h1>

  <canvas id="glcanvas"></canvas>
  <script src="app.js"></script>
